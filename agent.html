<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litpax IMS Agent</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; }

#ims-fab {
  position: fixed; bottom: 24px; right: 24px;
  width: 54px; height: 54px;
  background: #0d1f3c; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,0.28);
  z-index: 9999; border: none;
  transition: transform .2s, box-shadow .2s;
}
#ims-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(0,0,0,0.35); }
#ims-fab .fab-logo {
  width: 30px; height: 30px; background: #1D9E75; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff;
}
#ims-fab .fab-x { display: none; font-size: 22px; color: #fff; line-height: 1; }
#ims-fab.open .fab-logo { display: none; }
#ims-fab.open .fab-x    { display: block; }

#ims-popup {
  position: fixed; bottom: 90px; right: 24px;
  width: 340px; height: 490px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  display: flex; flex-direction: column; overflow: hidden;
  z-index: 9998; border: 1px solid #e5e7eb;
  opacity: 0; pointer-events: none;
  transform: scale(0.92) translateY(14px);
  transition: opacity .2s ease, transform .2s ease;
}
#ims-popup.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

#ims-head {
  background: #0d1f3c; padding: 11px 14px;
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
}
.h-logo {
  width: 26px; height: 26px; background: #1D9E75; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.h-name { font-size: 13px; font-weight: 700; color: #fff; }
.h-sub  { font-size: 10px; color: rgba(255,255,255,.4); }
#ims-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #f59e0b;
  margin-left: auto; flex-shrink: 0; transition: background .3s, box-shadow .3s;
}
#ims-dot.on  { background: #1D9E75; box-shadow: 0 0 6px #1D9E75; }
#ims-dot.err { background: #dc2626; box-shadow: none; }

#ims-msgs {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px; background: #f9fafb;
}
#ims-msgs::-webkit-scrollbar { width: 4px; }
#ims-msgs::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

.im { display: flex; flex-direction: column; max-width: 86%; gap: 2px; }
.im.u { align-self: flex-end; align-items: flex-end; }
.im.b { align-self: flex-start; align-items: flex-start; }
.ib {
  padding: 8px 12px; border-radius: 12px;
  font-size: 12.5px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.im.u .ib { background: #0d1f3c; color: #fff; border-bottom-right-radius: 3px; }
.im.b .ib { background: #fff; border: 1px solid #e5e7eb; color: #1f2937; border-bottom-left-radius: 3px; }
.im.b .ib.loading { color: #9ca3af; font-style: italic; }
.its { font-size: 10px; color: #9ca3af; padding: 0 3px; }

#ims-chips {
  display: flex; gap: 5px; flex-wrap: wrap;
  padding: 7px 12px 4px; background: #fff;
  border-top: 1px solid #f3f4f6; flex-shrink: 0;
}
.ic {
  font-size: 11px; padding: 3px 9px;
  border: 1px solid #e5e7eb; border-radius: 20px;
  cursor: pointer; background: #f9fafb; color: #6b7280;
  transition: all .12s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.ic:hover { background: #0d1f3c; color: #fff; border-color: #0d1f3c; }

#ims-bar {
  display: flex; gap: 6px; padding: 8px 10px 10px;
  border-top: 1px solid #e5e7eb; background: #fff; flex-shrink: 0;
}
#ims-inp {
  flex: 1; padding: 8px 11px;
  border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 12.5px; font-family: 'DM Sans', sans-serif;
  outline: none; color: #1f2937; background: #f9fafb;
  transition: border-color .12s;
}
#ims-inp:focus { border-color: #0d1f3c; background: #fff; }
#ims-send {
  padding: 8px 14px; background: #0d1f3c; color: #fff;
  border: none; border-radius: 8px; font-size: 16px;
  cursor: pointer; transition: background .12s; line-height: 1;
}
#ims-send:hover    { background: #162d52; }
#ims-send:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>

<button id="ims-fab" onclick="imsToggle()" title="IMS Agent">
  <div class="fab-logo">L</div>
  <span class="fab-x">✕</span>
</button>

<div id="ims-popup">
  <div id="ims-head">
    <div class="h-logo">L</div>
    <div>
      <div class="h-name">IMS Agent</div>
      <div class="h-sub">Litpax Inventory Assistant</div>
    </div>
    <div id="ims-dot"></div>
  </div>

  <div id="ims-msgs">
    <div class="im b">
      <div class="ib">Namaste! 👋 Stock, reorder, dispatch, WIP — kuch bhi poochho.</div>
      <div class="its">Abhi</div>
    </div>
  </div>

  <div id="ims-chips">
    <span class="ic" onclick="imsAsk('BMS ka stock kitna hai?')">BMS stock</span>
    <span class="ic" onclick="imsAsk('Reorder kya chahiye abhi?')">Reorder</span>
    <span class="ic" onclick="imsAsk('Aaj inward kya hua?')">Aaj inward</span>
    <span class="ic" onclick="imsAsk('WIP mein kya chal raha hai?')">WIP</span>
    <span class="ic" onclick="imsAsk('Cells ka status kya hai?')">Cells</span>
  </div>

  <div id="ims-bar">
    <input id="ims-inp" placeholder="Kuch bhi poochho..." onkeydown="if(event.key==='Enter') imsSend()" />
    <button id="ims-send" onclick="imsSend()">↑</button>
  </div>
</div>

<script src="agent.js"></script>
</body>
</html>
